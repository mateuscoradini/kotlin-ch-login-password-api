spring:
  application:
    name: kotlin-ch-login-password-api
  profiles:
    active: dev
  jackson:
    default-property-inclusion: non_null
    date-format: "yyyy-MM-dd'T'HH:mm:ssZ"

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: kotlin-ch-login-password-api

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha

logging:
  level:
    root: INFO
    br.com.coradini.kotlin.ch.login.api: INFO
